name: 更新化工利润追踪网站

on:
  push:
    paths:
      - 'data/**.xlsx'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 依赖
        run: pip install pandas openpyxl numpy

      - name: 查找 Excel 文件并生成网站
        run: |
          FILES=$(find data/ -name "*.xlsx" | sort)

          if [ -z "$FILES" ]; then
            echo "❌ data/ 目录中没有找到 Excel 文件"
            exit 1
          fi

          echo "📊 找到以下文件:"
          echo "$FILES"

          ARGS=""
          while IFS= read -r f; do
            ARGS="$ARGS \"$f\""
          done <<< "$FILES"

          eval python scripts/update_tracker.py $ARGS \
            --template scripts/template.html \
            --output index.html

          echo "✅ 生成完成"

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
