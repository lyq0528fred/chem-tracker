    return '<tr data-name="'+encodeURIComponent(d.name)+'" class="'+(d.name===SEL?'sel':'')+'">'
      +'<td><div class="nm">'+d.name+'</div><div class="nsb">'+d.full_name.split('：').slice(1,3).join('·')+'</div></td>'
      +'<td style="font-weight:700;white-space:nowrap;">'+fv(d.latest,d.unit)+'</td>'
      +'<td><div class="bw"><div class="bt"><div class="bf" style="width:'+pb+'%;background:'+pc+';"></div></div>'
      +'<span class="bv" style="color:'+pc+';">'+pd+'%</span></div>'
      +'<div style="font-size:10px;color:#ccc;margin-top:1px;">'+pl+'</div></td>'
      +'<td><span class="bdg '+bdc+'">'+bdl+'</span></td>'
      +'<td><span style="font-size:11px;padding:2px 8px;border-radius:12px;background:#f0f0ee;color:#666;">'+( d.cat||'' )+'</span></td>'+'<td style="color:'+cc+';font-weight:600;font-size:12px;white-space:nowrap;">'+fc(d.change,d.unit)+'</td>'
      +'<td style="font-size:12px;color:#bbb;">'+Math.round(d.data_years)+'年</td>'
      +'</tr>';
  }).join('');
  // Attach click handlers after render
  document.querySelectorAll('#tb tr').forEach(function(tr){
    tr.addEventListener('click',function(){clickRow(this);});
  });
  document.getElementById('ft').textContent='钢联（隆众资讯）· '+RAW.length+'个品种 · 显示'+data.length+'个 · 截至2026-03-20';
}
function clickRow(tr){
  var name=decodeURIComponent(tr.dataset.name);
  if(SEL===name){
    SEL=null;
    document.querySelectorAll('#tb tr').forEach(function(r){r.className='';});
    document.getElementById('cp').style.display='none';
    chartData=null;
    return;
  }
  SEL=name;
  document.querySelectorAll('#tb tr').forEach(function(r){r.className='';});
  tr.className='sel';
  showChart(name);
}
function showChart(name){
  var meta=RAW.find(function(d){return d.name===name;});
  document.getElementById('cp').style.display='';
  document.getElementById('ct').textContent=name+' — 利润历史分位走势（滚动窗口）';
  document.getElementById('cs2').textContent=meta?meta.full_name:'';
  setTimeout(function(){document.getElementById('cp').scrollIntoView({behavior:'smooth',block:'nearest'});},80);
  var ci=CIDX[name];
  if(ci===undefined||ci===null){document.getElementById('ct').textContent+=' (暂无图表数据)';return;}
  var sd=CHUNKS[ci]&&CHUNKS[ci][name];
  if(!sd){document.getElementById('ct').textContent+=' (数据加载失败)';return;}
  chartData=sd;
  TW='all';
  setTW('all');
  drawChart(sd);
}
function closeChart(){
  document.getElementById('cp').style.display='none';
  SEL=null;
  document.querySelectorAll('#tb tr').forEach(function(r){r.className='';});
  chartData=null;
}
function setTW(w){
  TW=w;
  ['all','10y','5y','3y','1y'].forEach(function(v){
    var el=document.getElementById('tw_'+v);
    if(el) el.className='tab'+(TW===v?' on':'');
  });
  if(chartData) drawChart(chartData);
}
function drawChart(sd){
  try { _drawChart(sd); } catch(e) {
    var d=document.createElement('div');
    d.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#900;color:#fff;padding:12px;font-family:monospace;font-size:11px;z-index:9999;white-space:pre-wrap;';
    d.textContent='drawChart ERROR: '+e.message+'\n'+e.stack;
    document.body.appendChild(d);
  }
}
function _drawChart(sd){
  var canvas=document.getElementById('cv');
  var box=canvas.parentElement;
  var W=box.clientWidth||800,H=320;
  var dpr=window.devicePixelRatio||1;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  var ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  var P={t:24,r:20,b:38,l:50};
  var cw=W-P.l-P.r,ch=H-P.t-P.b;
  var allMs=[];
  ['3Y','5Y','10Y'].forEach(function(k){(sd[k]||[]).forEach(function(p){allMs.push(BASE+p[0]*86400000);});});
  if(!allMs.length)return;
  var maxMs=Math.max.apply(null,allMs);
  var nowMs=maxMs;
  var twMap={all:0,'10y':10,'5y':5,'3y':3,'1y':1};
  var twYears=twMap[TW]||0;
  var minMs = twYears>0 ? Math.max(Math.min.apply(null,allMs), nowMs-twYears*365.25*86400000) : Math.min.apply(null,allMs);
  function xp(ms){return P.l+(ms-minMs)/(maxMs-minMs)*cw;}
  function yp(v){return P.t+(1-v/100)*ch;}
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  // Y gridlines
  [0,20,40,60,80,100].forEach(function(v){
    var y=yp(v);
    ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=1;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(P.l+cw,y);ctx.stroke();
    ctx.fillStyle='#aaa';ctx.font='11px sans-serif';ctx.textAlign='right';
    ctx.fillText(v+'%',P.l-5,y+4);
  });
  // X axis years
  var y0=new Date(minMs).getFullYear(),y1=new Date(maxMs).getFullYear();
  ctx.textAlign='center';ctx.fillStyle='#aaa';ctx.font='11px sans-serif';
  for(var yr=Math.ceil(y0/2)*2;yr<=y1;yr+=2){
    var ms=new Date(yr+'-01-01').getTime();
    if(ms<minMs||ms>maxMs)continue;
    var x=xp(ms);
    ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,P.t);ctx.lineTo(x,P.t+ch);ctx.stroke();
    ctx.fillText(yr,x,P.t+ch+14);
  }
  // Reference lines
  [[20,'#2CA02C','低位区 20%'],[80,'#e05050','高估区 80%']].forEach(function(item){
    var y=yp(item[0]);
    ctx.setLineDash([7,4]);ctx.strokeStyle=item[1];ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(P.l+cw,y);ctx.stroke();
    ctx.setLineDash([]);ctx.fillStyle=item[1];ctx.font='bold 10px sans-serif';ctx.textAlign='left';
    ctx.fillText(item[2],P.l+4,y-4);
  });
  // Series lines
  [['3Y','#4C72B0'],['5Y','#FF7F0E'],['10Y','#2CA02C']].forEach(function(s){
    var pts=sd[s[0]]||[];if(!pts.length)return;
    ctx.setLineDash([]);ctx.strokeStyle=s[1];ctx.lineWidth=1.8;ctx.beginPath();
    var first=true;
    pts.forEach(function(p){var x=xp(BASE+p[0]*86400000),y=yp(p[1]);if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);});
    ctx.stroke();
  });
  // Tooltip
  var tt=document.getElementById('tt');
  canvas.onmousemove=function(e){
    var r=canvas.getBoundingClientRect();
    var mx=e.clientX-r.left,my=e.clientY-r.top;
    if(mx<P.l||mx>P.l+cw||my<P.t||my>P.t+ch){tt.style.display='none';return;}
    var ratio=(mx-P.l)/cw,ms=minMs+ratio*(maxMs-minMs);
    var best=null,bd=Infinity;
    (sd['3Y']||[]).forEach(function(p){var d=Math.abs(BASE+p[0]*86400000-ms);if(d<bd){bd=d;best=p[0];}});
    if(!best){tt.style.display='none';return;}
    var bms=BASE+best*86400000,dt=new Date(bms);
    var ds=dt.getFullYear()+'-'+(dt.getMonth()<9?'0':'')+(dt.getMonth()+1)+'-'+(dt.getDate()<10?'0':'')+dt.getDate();
    var html='<b>'+ds+'</b>';
    [['3Y','#7BA0D4','3年'],['5Y','#FFB060','5年'],['10Y','#70C070','10年']].forEach(function(s){
      var pts=sd[s[0]]||[],val=null;
      for(var i=0;i<pts.length;i++){if(pts[i][0]===best){val=pts[i][1];break;}}
      if(val!=null)html+='<br><span style="color:'+s[1]+'">'+s[2]+': '+val.toFixed(1)+'%</span>';
    });
    tt.innerHTML=html;tt.style.display='block';
    var tx=mx+14,ty=my-10;
    if(tx+130>W)tx=mx-140;
    tt.style.left=tx+'px';tt.style.top=ty+'px';
  };
  canvas.onmouseleave=function(){tt.style.display='none';};
}
window.addEventListener('resize',function(){if(chartData)drawChart(chartData);});
render();

</script>
</body></html>
